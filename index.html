<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI VAI AI SYSTEM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:url('https://cloudinary-marketing-res.cloudinary.com/image/upload/ar_0.5,c_fill,g_auto,w_433/q_auto/f_auto/hiking_dog_mountain.jpg') center center/cover no-repeat;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
width:360px;
background:rgba(0,0,0,.85);
padding:20px;
border-radius:15px;
text-align:center;
}

.title{
font-size:22px;
font-weight:900;
background:linear-gradient(90deg,#00ff88,#00bbff,#ff00aa,#ffee00,#00ff88);
background-size:400% 400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbow 1s linear infinite;
margin-bottom:15px;
}

@keyframes rainbow{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.login-btn{
background:#00c853;
color:white;
}

#error{
margin-top:8px;
color:#ff5252;
}

#dashboard{display:none;}

.timer{
font-size:28px;
color:#ffd600;
font-weight:bold;
}

.bs{
font-size:34px;
font-weight:bold;
margin-top:15px;
}

.big{color:#00ff88;}
.small{color:#ff5252;}

.num{
font-size:28px;
margin-top:10px;
padding:10px;
border:1px solid #00ff88;
border-radius:10px;
}

.history{
margin-top:15px;
height:120px;
overflow:auto;
background:#111;
padding:10px;
border-radius:10px;
text-align:left;
}

.win{color:#00ff88;}
.jackpot{color:#ff9800;}

.float-left,
.float-right{
position:fixed;
bottom:20px;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
display:none;
z-index:9999;
animation:pulse 1.3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.float-left{
left:20px;
background:linear-gradient(90deg,#9c27b0,#e91e63);
}

.float-right{
right:20px;
background:linear-gradient(90deg,#2196f3,#00e5ff);
}

.ai-panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
display:none;
z-index:10000;
overflow:auto;
padding:20px;
}

.close-btn{
background:red;
color:white;
}
</style>
</head>

<body>

<div class="box">

<div id="loginPage">
<div class="title">MEHEDI VAI AI SYSTEM</div>

<input type="password" id="password" placeholder="Enter Password">

<button class="login-btn" onclick="login()">LOGIN</button>

<div id="error"></div>
</div>

<div id="dashboard">

<div class="title">MEHEDI VAI AI SYSTEM</div>

<div class="timer"><span id="time">30</span>s</div>

<div class="bs" id="bs">BIG</div>

<div class="num" id="num">0</div>

<div class="history" id="history"></div>

</div>

</div>

<div class="float-left" id="aiBtn" onclick="openAI()">AI PANEL</div>

<div class="float-right" id="webBtn" onclick="openSite()">WEBSITE</div>

<div class="ai-panel" id="aiPanel">
<div style="max-width:600px;margin:auto;text-align:center;">
<div class="title">MEHEDI VAI AI SYSTEM</div>
<h2>AI SYSTEM ACTIVE</h2>
<p>BIG / SMALL SYSTEM RUNNING</p>
<button class="login-btn" onclick="closeAI()">CLOSE PANEL</button>
</div>
</div>

<script>
let time = 30;
const historyBox = document.getElementById("history");

function login(){
let pass = document.getElementById("password").value;

if(pass === "mehedi11"){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("aiBtn").style.display="block";
document.getElementById("webBtn").style.display="block";

setInterval(timer,1000);
}else{
document.getElementById("error").innerText="Wrong Password";
}
}

function openSite(){
window.open("https://hgnice.bet/#/register?invitationCode=531211974484","_blank");
}

function openAI(){
document.getElementById("aiPanel").style.display="block";
}

function closeAI(){
document.getElementById("aiPanel").style.display="none";
}

function timer(){
time--;
if(time<=0){
time=30;
updateSystem();
}
document.getElementById("time").innerText=time;
}

function updateSystem(){
let num=Math.floor(Math.random()*10);
let bs=num>=5?"BIG":"SMALL";

document.getElementById("num").innerText=num;
document.getElementById("bs").innerText=bs;

document.getElementById("bs").className="bs "+(bs==="BIG"?"big":"small");

let result=Math.random()>0.5?"WIN":"JACKPOT";

let div=document.createElement("div");
div.innerText=result;
div.className=result==="WIN"?"win":"jackpot";

historyBox.prepend(div);
}

updateSystem();
</script>

</body>
</html>
