<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#001219,#000,#000814);
    color:white;
    overflow:hidden;
}

/* MATRIX SCAN EFFECT */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,transparent,rgba(0,255,200,0.05),transparent);
    animation:scan 3s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    0%{transform:translateY(-100%)}
    100%{transform:translateY(100%)}
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#mainTitle{
    font-size:32px;
    font-weight:900;
    text-align:center;
    text-transform:uppercase;
    background:linear-gradient(90deg,#00f5d4,#00bbf9,#fee440,#f15bb5,#00f5d4);
    background-size:400% 400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 3s linear infinite;
}

@keyframes glow{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00b4d8,#0077b6);
    color:white;
}

/* MESSAGE */
#message{
    font-weight:bold;
    text-align:center;
    animation:blink 1s infinite alternate;
}

@keyframes blink{
    from{opacity:0.5}
    to{opacity:1}
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* DEV TITLE BIG */
#devText{
    font-size:26px;
    font-weight:900;
    margin-top:10px;

    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s linear infinite;
}

/* TIMER TOP LABEL */
#devTopLabel{
    font-size:18px;
    font-weight:900;
    margin-top:20px;

    background:linear-gradient(90deg,#00f5d4,#00bbf9,#fee440,#f15bb5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 3s linear infinite;
}

/* RESULT */
#result{
    font-size:140px;
    font-weight:900;
    margin-top:10px;

    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shake 0.8s infinite alternate, glow 3s linear infinite;
}

@keyframes shake{
    from{transform:scale(0.95) rotate(-1deg)}
    to{transform:scale(1.05) rotate(1deg)}
}

/* TIMER */
#timer{
    font-size:65px;
    font-weight:900;
    color:#fee440;
}

/* LIVE */
#liveText{
    font-size:18px;
    font-weight:bold;
    color:#00f5d4;
    letter-spacing:2px;
}

/* LIFETIME */
#lifetime{
    margin-top:10px;
    font-size:14px;
    color:#00bbf9;
}

/* CONTACT */
#contactBox{
    margin-top:60px;
    padding:18px;
    border:1px solid #00f5d4;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-weight:bold;
    color:#00f5d4;
    cursor:pointer;
    transition:0.3s;
}

#contactBox:hover{
    transform:scale(1.08);
    box-shadow:0 0 30px #00f5d4;
}

#contactBox img{
    width:24px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div id="mainTitle">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="message"></div>

</div>

<!-- APP -->
<div id="app">

    <!-- BIG DEV LINE -->
    <div id="devText">🔥 MEHEDI VAI AI SYSTEM DEVELOPER 🔥</div>

    <!-- TIMER TOP LABEL -->
    <div id="devTopLabel">💎 SYSTEM RUNNING LIVE 💎</div>

    <div id="result">---</div>

    <div id="timer">30</div>

    <div id="liveText">⚡ REAL TIME LIVE ⚡</div>

    <div id="lifetime">💎 LIFETIME ACTIVE SYSTEM 💎</div>

    <!-- CONTACT -->
    <div id="contactBox" onclick="openTelegram()">
        📡 CONTACT WITH ADMIN
    </div>

</div>

<script>

const PASSWORD = "MEHEDIVAI115";
let countdown = 30;
let started = false;

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    if(pass === PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        if(!started){
            started=true;
            startSystem();
        }

    }else{

        msg.style.color="#ff4d6d";
        msg.innerText="❌ Wrong Password! Please contact Mehedi Vai for access";
    }
}

/* RANDOM */
function randomResult(){
    return Math.random()<0.5?"BIG":"SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText=randomResult();

    setInterval(()=>{

        countdown--;

        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            document.getElementById("result").innerText=randomResult();
        }

    },1000);
}

/* TELEGRAM */
function openTelegram(){
    window.open("https://t.me/MEHEDIVA999","_blank");
}

</script>

</body>
</html>
