<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJ RTB AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow:hidden;

    background-image: url("https://i.postimg.cc/m29d9Z6t/IMG-20260610-145538-764.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

.flash{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

/* TITLE */
#title{
    font-size:28px;
    font-weight:900;
    text-align:center;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* APP TITLE (NEW ANIMATION) */
#appTitle{
    font-size:18px;
    font-weight:900;
    text-align:center;
    margin-bottom:10px;

    background:linear-gradient(90deg,#00ff99,#00bbf9,#ffcc00,#ff006e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:popTitle 1.5s infinite alternate;
}

@keyframes popTitle{
    0%{transform:translateY(-5px);opacity:0.6}
    50%{transform:translateY(0px);opacity:1}
    100%{transform:translateY(5px);opacity:0.6}
}

/* INPUT */
input,button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    background:#0077b6;
    color:white;
    font-weight:bold;
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

#devText{
    font-size:18px;
    font-weight:900;
    animation:glow 2s infinite;
}

@keyframes glow{
    0%{opacity:1}
    50%{opacity:0.4}
    100%{opacity:1}
}

#result{
    font-size:45px;
    font-weight:900;
    margin-top:20px;
}

#nums{
    font-size:30px;
    margin-top:10px;
    color:#00ff99;
}

#timer{
    font-size:55px;
    color:#ffd60a;
    font-weight:900;
}

#logs{
    margin-top:20px;
    height:120px;
    border:1px solid #00ff99;
    padding:10px;
    font-size:12px;
    color:#00ff99;
}

/* ===== FLOAT BUTTONS (NEW PREMIUM STYLE) ===== */
.floatBtn{
    position:fixed;
    bottom:20px;
    padding:12px 14px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    font-size:12px;
    z-index:9999;
    animation:pulse 1.5s infinite;
    backdrop-filter:blur(10px);
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.08)}
    100%{transform:scale(1)}
}

#aiBtn{
    left:20px;
    background:linear-gradient(90deg,#9c27b0,#6a0dad);
}

#webBtn{
    right:20px;
    background:linear-gradient(90deg,#2196f3,#00c6ff);
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- LOGIN -->
<div id="loginBox">

    <div id="title">RAJ RTB AI SYSTEM</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="msg"></div>

</div>

<!-- APP -->
<div id="app">

    <!-- NEW ANIMATED TITLE -->
    <div id="appTitle">MEHEDI VAI AI SYSTEM</div>

    <div id="devText">RAJ RTB AI SYSTEM ACTIVE</div>

    <div id="result">---</div>
    <div id="nums"></div>

    <div id="timer">30</div>

    <div id="logs"></div>

</div>

<!-- FLOAT BUTTONS (ONLY AFTER LOGIN) -->
<div id="aiBtn" class="floatBtn" onclick="alert('AI SYSTEM OPENED')">
AI PANEL
</div>

<div id="webBtn" class="floatBtn" onclick="openSite()">
WEBSITE
</div>

<script>

const PASSWORD="rdraj001";

let countdown=30;
let started=false;
let lastType="";

/* hide buttons initially */
document.getElementById("aiBtn").style.display="none";
document.getElementById("webBtn").style.display="none";

/* LOGIN */
function login(){

    let pass=document.getElementById("password").value;
    let msg=document.getElementById("msg");

    if(pass===PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        document.getElementById("aiBtn").style.display="block";
        document.getElementById("webBtn").style.display="block";

        if(!started){
            started=true;
            startSystem();
            startLogs();
        }

    } else {
        msg.innerText="❌ Wrong Password!";
    }
}

/* OPEN WEBSITE */
function openSite(){
    window.open('https://hgnice.bet/#/register?invitationCode=531211974484','_blank');
}

/* SYSTEM */
function startSystem(){

    update();

    setInterval(()=>{

        countdown--;
        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            update();
        }

    },1000);
}

/* RANDOM */
function getType(){
    return Math.random()<0.5?"BIG":"SMALL";
}

function update(){

    let type=getType();

    if(type===lastType){
        type = type==="BIG"?"SMALL":"BIG";
    }

    lastType=type;

    let nums = [Math.floor(Math.random()*10),
                Math.floor(Math.random()*10),
                Math.floor(Math.random()*10)];

    document.getElementById("result").innerText=type;
    document.getElementById("nums").innerText=nums.join(" ");

}

/* LOGS */
function startLogs(){

    const logs=[
    "mehedi ai system...",
    "system running...",
    "ai engine online...",
    "processing data..."
    ];

    setInterval(()=>{

        document.getElementById("logs").innerText=
        logs[Math.floor(Math.random()*logs.length)];

    },900);
}

</script>

</body>
                          </html>
